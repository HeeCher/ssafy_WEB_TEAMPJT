<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalHub - 스팟 상세</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">
  <header class="fixed top-0 left-0 right-0 z-50 glass shadow-sm">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16 gap-3">
        <a href="index.html" class="flex items-center gap-3">
          <div class="bg-primary text-white p-2 rounded-xl shadow-md flex items-center justify-center">
            <i class="ph-fill ph-buildings text-xl"></i>
          </div>
          <div>
            <h1 class="text-xl font-bold text-white leading-tight">LocalHub</h1>
            <p class="text-xs text-slate-300 font-medium">서울 익명 커뮤니티</p>
          </div>
        </a>
        <nav class="hidden md:flex items-center gap-6 text-sm font-medium">
          <a href="index.html" class="text-slate-300 hover:text-white transition-colors">홈</a>
          <a href="board.html" class="text-slate-300 hover:text-white transition-colors">게시판</a>
          <a href="write.html" class="text-slate-300 hover:text-white transition-colors">글쓰기</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="flex-grow pt-24 pb-16">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 space-y-8">
      <section class="bg-white rounded-3xl shadow-2xl border border-slate-100 p-8">
        <div class="mb-6">
          <a href="index.html" class="text-sm text-slate-500 hover:text-primary">&larr; 추천 스팟으로 돌아가기</a>
        </div>

        <div class="grid gap-8 lg:grid-cols-[2fr_1fr]">
          <div>
            <h1 id="spotTitle" class="text-4xl font-bold text-slate-900 mb-3">스팟 제목</h1>
            <p id="spotCategory" class="inline-flex items-center gap-2 rounded-full bg-slate-100 text-slate-700 text-sm font-semibold px-4 py-2 mb-4">
              <i class="ph-fill ph-map-pin"></i> 카테고리
            </p>
            <p id="spotAddress" class="text-slate-500 mb-4"></p>

            <div class="relative overflow-hidden rounded-[2rem] border border-slate-200 shadow-sm">
              <div id="carouselImages" class="flex snap-x snap-mandatory overflow-x-auto scroll-smooth no-scrollbar"></div>
              <button id="carouselPrev" class="absolute left-4 top-1/2 -translate-y-1/2 bg-white/90 border border-slate-200 rounded-full p-3 shadow hover:bg-white transition">
                <i class="ph ph-caret-left text-xl"></i>
              </button>
              <button id="carouselNext" class="absolute right-4 top-1/2 -translate-y-1/2 bg-white/90 border border-slate-200 rounded-full p-3 shadow hover:bg-white transition">
                <i class="ph ph-caret-right text-xl"></i>
              </button>
            </div>
          </div>

          <div class="space-y-6">
            <div class="rounded-3xl bg-slate-50 border border-slate-200 p-6">
              <h2 class="text-xl font-bold text-slate-900 mb-4">스팟 특징</h2>
              <ul id="featureList" class="space-y-3 text-slate-600"></ul>
            </div>

            <div class="rounded-3xl bg-slate-50 border border-slate-200 p-6">
              <h2 class="text-xl font-bold text-slate-900 mb-4">기본 정보</h2>
              <p class="text-slate-500 mb-2"><strong>전화번호:</strong> <span id="spotTel"></span></p>
              <p class="text-slate-500"><strong>주소:</strong> <span id="spotAddr"></span></p>
            </div>
          </div>
        </div>
      </section>

      <section class="bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden">
        <div class="p-6">
          <h2 class="text-2xl font-bold text-slate-900 mb-4">가까운 지하철역</h2>
          <div id="stationList" class="grid gap-4 sm:grid-cols-2"></div>
        </div>
        <div class="border-t border-slate-200 p-6">
          <h2 class="text-2xl font-bold text-slate-900 mb-4">주변 맛집</h2>
          <div id="restaurantList" class="grid gap-4 sm:grid-cols-2"></div>
        </div>
      </section>

      <section class="bg-white rounded-3xl shadow-2xl border border-slate-100 p-6">
        <h2 class="text-2xl font-bold text-slate-900 mb-4">지도</h2>
        <div class="aspect-[16/9] overflow-hidden rounded-3xl border border-slate-200">
          <iframe id="spotMap" class="w-full h-full" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
      </section>
    </div>
  </main>

  <footer class="bg-white border-t border-slate-200">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-2">
        <i class="ph-fill ph-buildings text-slate-400 text-xl"></i>
        <span class="font-bold text-slate-600">LocalHub</span>
      </div>
      <p class="text-slate-400 text-sm text-center md:text-left">본 사이트는 교육용 프로젝트 산출물입니다. 제공되는 공공데이터에 기반합니다.</p>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/spot.js"></script>
</body>
</html>
