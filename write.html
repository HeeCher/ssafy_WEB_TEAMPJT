<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalHub - 글쓰기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">
  <header class="fixed top-0 left-0 right-0 z-50 glass shadow-sm">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16 gap-3">
        <a href="index.html" class="flex items-center gap-3">
          <div class="bg-primary text-white p-2 rounded-xl shadow-md flex items-center justify-center">
            <i class="ph-fill ph-buildings text-xl"></i>
          </div>
          <div>
            <h1 class="text-xl font-bold text-white leading-tight">LocalHub</h1>
            <p class="text-xs text-slate-300 font-medium">서울 익명 커뮤니티</p>
          </div>
        </a>
        <nav class="hidden md:flex items-center gap-6 text-sm font-medium">
          <a href="index.html" class="text-slate-300 hover:text-white transition-colors">홈</a>
          <a href="board.html" class="text-slate-300 hover:text-white transition-colors">게시판</a>
          <a href="spot.html" class="text-white border-b-2 border-primary pb-1">가볼만한곳 추천</a>
        </nav>
        <div class="flex items-center gap-3">
          <button id="chatToggle" aria-label="챗봇 열기" class="bg-white/10 border border-white/20 text-white px-4 py-2 rounded-full text-sm hover:bg-white/20 transition">AI 챗봇</button>
          <button id="mobileMenuButton" aria-label="모바일 메뉴" class="md:hidden text-white p-2 rounded-full hover:bg-white/10 transition-colors">
            <i class="ph ph-list text-xl"></i>
          </button>
        </div>
      </div>
    </div>
    <div id="mobileMenu" class="md:hidden bg-slate-950/95 backdrop-blur-xl border-t border-white/10 px-4 py-4 hidden">
      <div class="flex flex-col gap-3">
        <a href="index.html" class="text-white font-semibold">홈</a>
        <a href="board.html" class="text-slate-300 hover:text-white transition-colors">게시판</a>
      </div>
    </div>
  </header>

  <main class="flex-grow pt-24 pb-16">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="mb-6">
        <a href="board.html" class="text-sm text-slate-500 hover:text-primary">&larr; 게시판으로 돌아가기</a>
      </div>
      <section class="bg-white rounded-3xl shadow-2xl border border-slate-100 p-8">
        <div class="mb-6">
          <h1 class="text-3xl font-bold text-slate-900">새 게시글 작성</h1>
          <p class="text-slate-500 mt-2">작성 후 자동으로 상세 페이지로 이동합니다.</p>
          <button type="submit" id="submitButton" class="bg-primary text-white rounded-3xl px-6 py-4 font-bold hover:bg-blue-600 transition">등록하기</button>
        </div>
        <form id="writeForm" class="space-y-6">
          <div>
            <label class="block mb-2 text-sm font-medium text-slate-700">제목</label>
            <input name="title" type="text" placeholder="게시글 제목을 입력하세요" class="w-full rounded-3xl border border-slate-200 px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-400" required>
          </div>
          <div class="grid gap-4 sm:grid-cols-2">
            <div>
              <label class="block mb-2 text-sm font-medium text-slate-700">카테고리</label>
              <select name="category" class="w-full rounded-3xl border border-slate-200 px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-400">
                <option value="맛집탐방">맛집탐방</option>
                <option value="동네질문">동네질문</option>
                <option value="축제/행사">축제/행사</option>
                <option value="가볼만한곳">가볼만한곳</option>
              </select>
            </div>
            <div>
              <label class="block mb-2 text-sm font-medium text-slate-700">태그</label>
              <input name="tags" type="text" placeholder="맛집, 야경, 추천" class="w-full rounded-3xl border border-slate-200 px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
          </div>
          <div>
            <label class="block mb-2 text-sm font-medium text-slate-700">내용</label>
            <textarea name="content" rows="10" placeholder="게시글 내용을 입력하세요" class="w-full rounded-3xl border border-slate-200 px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-400" required></textarea>
          </div>
          <div class="flex justify-end">
            <button type="submit" class="bg-primary text-black rounded-3xl px-6 py-4 font-semibold shadow-lg hover:bg-blue-600 transition">등록하고 상세 보기</button>
          </div>
        </form>
      </section>
    </div>
  </main>

  <footer class="bg-white border-t border-slate-200">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-2">
        <i class="ph-fill ph-buildings text-slate-400 text-xl"></i>
        <span class="font-bold text-slate-600">LocalHub</span>
      </div>
      <p class="text-slate-400 text-sm text-center md:text-left">본 사이트는 교육용 프로젝트 산출물입니다. 제공되는 공공데이터에 기반합니다.</p>
    </div>
  </footer>

  <div id="chatbotWindow" class="fixed bottom-6 right-6 w-[320px] max-w-full bg-white border border-slate-200 rounded-3xl shadow-2xl p-4 transition duration-300 scale-95 opacity-0 pointer-events-none">
    <div class="flex items-center justify-between mb-3">
      <div>
        <h3 class="text-base font-bold text-slate-900">AI 챗봇</h3>
        <p class="text-xs text-slate-500">서울 관련 질문을 해보세요.</p>
      </div>
      <button onclick="toggleChatbot()" class="text-slate-400 hover:text-slate-700"><i class="ph ph-x text-xl"></i></button>
    </div>
    <div id="chatHistory" class="flex flex-col gap-3 max-h-72 overflow-y-auto pb-2"></div>
    <form id="chatForm" class="mt-3 flex gap-2">
      <input id="chatInput" type="text" placeholder="예: 서울 가볼만한곳 추천" class="flex-1 rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      <button type="submit" class="bg-primary text-white rounded-2xl px-4 py-3 text-sm">전송</button>
    </form>
  </div>
  <div id="toastContainer" class="fixed bottom-6 left-1/2 -translate-x-1/2 flex flex-col gap-3 items-center z-50"></div>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/write.js"></script>
</body>
</html>
